services:
  app:
    build:
      context: .
      target: base
    working_dir: /var/www/html
    command: >
      sh -c "composer install &&
             npm install &&
             php artisan key:generate --force &&
             php artisan migrate --seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  vite:
    build:
      context: .
      target: base
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    depends_on:
      - app

  queue:
    build:
      context: .
      target: base
    working_dir: /var/www/html
    command: sh -c "composer install && php artisan queue:work --tries=3 --sleep=2"
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vvk_school
      POSTGRES_USER: vvk
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:

